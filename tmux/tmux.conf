set-option -sa terminal-overrides ",xterm*:Tc"
# set-option -g status-position top
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g mouse on

set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Propagate focus events to applications
set-option -ga update-environment 'GEMINI_API_KEY'

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Resize panes using Prefix + Shift + h/j/k/l
# The '-r' flag lets you hold Shift and tap h/j/k/l multiple times!
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# set vi-mode
set-window-option -g mode-keys vi

# mouse support
set -g mouse on

# copy support
set-option -g set-clipboard external

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

bind-key -n M-f run-shell "~/scripts/tmux-sesh.sh"

# Battery / Power Consumption Floating Widget (Alt + b)
bind-key -n M-b display-popup -w 30 -h 12 -E "~/scripts/battery.sh"

bind 'h' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"


# fix for tmux-prefix
unbind C-b
set -g prefix C-b
bind C-b send-prefix
# fix end

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# set default terminal type to support 256 colors
set -g default-terminal "screen-256color"

# enable true color and better character rendering
set -ga terminal-overrides ",*256col*:tc"

# fix line-drawing characters to prevent visual desyncs
set -ag terminal-overrides ",*:u8=0"

path="#(if [[ $home == #{pane_current_path} ]]; then echo \"~\" ; else echo #{b:pane_current_path}; fi)"

set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_battery_widget 1

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Simplified binding for Tmux >= 3.0 (Removes the need for 'bc' or 'awk')
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on' # Save what's currently on your screen (logs, etc.)
set -g @resurrect-dir "$HOME/.local/share/tmux/resurrect"

# Continuum settings
set -g @continuum-restore 'on' # Automatically restore the last saved session when Tmux starts
set -g @continuum-save-interval '15' # Auto-save every 15 minutes in the background

# ==========================================
# TPM (Tmux Plugin Manager) XDG Fix
# ==========================================
# Tell TPM exactly where to put new plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
